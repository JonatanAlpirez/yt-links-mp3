# yt-links-mp3 — example config
# Copia este archivo a ~/.config/yt-links-mp3/config.yaml o a ./config.yaml

# Carpeta de salida
output_dir: ~/Music/Downloads

# Formato y calidad de audio
audio_format: mp3
audio_quality: 192  # kbps

# Descarga
concurrency: 3
skip_existing: true
force: false
dry_run: false

# Metadatos
embed_metadata: true
embed_thumbnail: true

# Plantilla de nombre (placeholders: artist, title, album, track_number, ext)
filename_template: "{artist}/{album}/{track_number:02d} - {title}.{ext}"

# Archivo de links fallidos (auto-generado cuando algo falla)
# Útil para reintentar: yt-links-mp3 download links.txt.failed
failed_filename: "links.txt.failed"
